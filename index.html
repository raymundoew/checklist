<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Comedor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-si.active { background-color: #10b981; color: white; border-color: #10b981; }
        .btn-no.active { background-color: #ef4444; color: white; border-color: #ef4444; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-slate-100 p-2 sm:p-6 font-sans">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
        <div class="bg-slate-800 p-6 text-white">
            <h1 class="text-xl font-bold uppercase tracking-wider">Control Diario de Comidas</h1>
            <p id="fechaDisplay" class="text-slate-400 text-sm"></p>
        </div>

        <div class="table-responsive">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b text-slate-700 uppercase text-xs">
                        <th class="p-4">Nombre Completo</th>
                        <th class="p-4 text-center">Comida</th>
                        <th class="p-4 text-center">Asistencia</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>

        <div class="p-6 bg-slate-50">
            <button onclick="enviarDatos()" id="btnEnviar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                GUARDAR REGISTRO DEL DÍA
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzaHRn6WG8ZJjXicyNxfPdX-turSuB8bpWB3-qEH2_MGuVkxH3baST_ITCG3QRYoCzy/exec";
        const personas = [
            "ALANIA CARRION, JAYRO",
            "ASPARREN ALANIA, CRISTIAN ALEXIS",
            "CARDENAS ROJAS, YHADER ROGELIO",
            "LEONARDO RIVERA, BRYAN ANTHONY",
            "QUINCHORI PARDO, JOSELITO"
        ];
        const comidas = ["DESAYUNO", "ALMUERZO", "CENA"];
        let respuestas = {};

        function render() {
            const tbody = document.getElementById('tablaCuerpo');
            const fecha = new Date().toLocaleDateString('es-ES');
            document.getElementById('fechaDisplay').innerText = `Fecha: ${fecha}`;

            let html = "";
            personas.forEach(p => {
                comidas.forEach((c, index) => {
                    html += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 text-sm font-bold text-slate-700">${index === 0 ? p : ''}</td>
                        <td class="p-4 text-center text-xs font-semibold text-slate-500">${c}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="votar('${p}','${c}','SI')" id="${p}-${c}-SI" class="btn-si border-2 border-slate-200 px-4 py-1 rounded-md text-xs font-bold transition-all">SI</button>
                                <button onclick="votar('${p}','${c}','NO')" id="${p}-${c}-NO" class="btn-no border-2 border-slate-200 px-4 py-1 rounded-md text-xs font-bold transition-all">NO</button>
                            </div>
                        </td>
                    </tr>`;
                });
            });
            tbody.innerHTML = html;
        }

        function votar(p, c, val) {
            const key = `${p}-${c}`;
            respuestas[key] = val;
            
            document.getElementById(`${p}-${c}-SI`).classList.remove('active');
            document.getElementById(`${p}-${c}-NO`).classList.remove('active');
            document.getElementById(`${p}-${c}-${val}`).classList.add('active');
        }

        async function enviarDatos() {
            if (Object.keys(respuestas).length < (personas.length * comidas.length)) {
                alert("⚠️ Por favor, completa todos los campos antes de guardar.");
                return;
            }

            const btn = document.getElementById('btnEnviar');
            btn.innerText = "⏳ GUARDANDO...";
            btn.disabled = true;

            const payload = [];
            const fechaHoy = new Date().toLocaleDateString('es-ES');
            for (const key in respuestas) {
                const [nombre, comida] = key.split('-');
                payload.push({ fecha: fechaHoy, nombre, comida, estado: respuestas[key] });
            }

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ ¡Registro guardado con éxito!");
                location.reload();
            } catch (e) {
                alert("❌ Error de conexión. Intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = "GUARDAR REGISTRO DEL DÍA";
            }
        }

        render();
    </script>
</body>
</html>
